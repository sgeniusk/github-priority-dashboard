<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 뉴스</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Serif+KR:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#f5f4ed;
  --ivory:#faf9f5;
  --ink:#1B365D;
  --text:#141413;
  --secondary:#3d3d3a;
  --sub:#504e49;
  --meta:#6b6a64;
  --border:#e8e6dc;
  --border-soft:#e5e3d8;
  --serif:"Nanum Myeongjo","Noto Serif KR","Apple SD Gothic Neo",Georgia,serif;
  --sans:"Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif;
  --shadow:0 18px 44px rgba(64,58,40,.055),0 1px 0 rgba(64,58,40,.035);
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  background:var(--parchment);
  color:var(--text);
  font-family:var(--serif);
  font-size:17px;
  line-height:1.55;
  letter-spacing:0;
}
a{color:inherit}
.page{
  width:min(100%,980px);
  margin:0 auto;
  padding:28px 24px 84px;
}
.top-link{
  display:inline-flex;
  align-items:center;
  min-height:34px;
  margin-bottom:54px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:13px;
  font-weight:500;
  text-decoration:none;
}
.top-link:hover{text-decoration:underline;text-underline-offset:4px}
.hero{
  max-width:760px;
  margin:0 auto 58px;
}
.eyebrow{
  margin:0 0 14px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:12px;
  font-weight:600;
  letter-spacing:.12em;
}
h1,h2,h3,p{margin:0}
h1{
  font-size:clamp(40px,7vw,72px);
  font-weight:500;
  line-height:1.15;
  color:var(--text);
}
.meta-line{
  margin-top:18px;
  color:var(--meta);
  font-family:var(--sans);
  font-size:13px;
  line-height:1.45;
}
.feed{
  max-width:780px;
  margin:0 auto;
}
.date-group{
  margin:0 0 46px;
}
.date-group:last-child{margin-bottom:0}
.date-heading{
  display:flex;
  align-items:center;
  gap:14px;
  margin:0 0 18px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:13px;
  font-weight:600;
  letter-spacing:.08em;
}
.date-heading::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--border);
}
.news-card{
  position:relative;
  margin:0 0 16px;
  padding:24px 28px 26px;
  background:var(--ivory);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.news-card::before{
  content:"";
  position:absolute;
  left:-1px;
  top:22px;
  bottom:22px;
  width:3px;
  background:var(--ink);
  border-radius:0 2px 2px 0;
}
.news-card-head{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px 10px;
  margin-bottom:13px;
  font-family:var(--sans);
}
.repo-link{
  color:var(--ink);
  font-size:13px;
  font-weight:700;
  text-decoration:none;
}
.repo-link:hover{text-decoration:underline;text-underline-offset:4px}
.kind-badge,.metric{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:3px 9px;
  border-radius:999px;
  font-family:var(--sans);
  font-size:11px;
  font-weight:700;
  line-height:1.2;
}
.kind-badge{color:var(--ink);background:#E4ECF5}
.kind-badge.surge{color:#7a2d0a;background:#ffe2d3}
.kind-badge.stall{color:#6d3f00;background:#fff0cf}
.kind-badge.status{color:#24515a;background:#dff5f7}
.metric{color:var(--meta);background:var(--parchment)}
.news-title{
  color:var(--text);
  font-size:25px;
  font-weight:500;
  line-height:1.3;
}
.news-detail{
  max-width:680px;
  margin-top:12px;
  color:var(--secondary);
  font-size:16.5px;
  line-height:1.55;
}
.loading,.empty,.error{
  max-width:680px;
  margin:80px auto;
  color:var(--meta);
  font-family:var(--sans);
  font-size:14px;
}
footer{
  max-width:780px;
  margin:72px auto 0;
  padding-top:22px;
  border-top:1px solid var(--border);
  color:var(--meta);
  font-family:var(--sans);
  font-size:12px;
  line-height:1.5;
}
@media (max-width:720px){
  body{font-size:16px}
  .page{padding:22px 18px 62px}
  .top-link{margin-bottom:42px}
  .hero{margin-bottom:46px}
  .news-card{padding:22px 20px 23px}
  .news-title{font-size:22px}
}
</style>
</head>
<body>
<main class="page">
  <a class="top-link" href="dashboard.html">← 대시보드</a>
  <header class="hero" id="hero">
    <p class="eyebrow">PROJECT NEWS</p>
    <h1>프로젝트 뉴스</h1>
    <p class="meta-line" id="metaLine">데이터를 불러오는 중</p>
  </header>
  <div class="feed" id="reportRoot" aria-live="polite">
    <p class="loading">뉴스를 불러오는 중입니다.</p>
  </div>
  <footer id="footerMeta"></footer>

function text(tag, className, value){
  const el = document.createElement(tag);
  if(className) el.className = className;
  el.textContent = value || "";
  return el;
}

function kindLabel(kind){
  if(kind === "progress") return "progress▲";
  if(kind === "surge") return "surge🔥";
  if(kind === "stall") return "stall⚠";
  return "status";
}

function repoHref(repo){
  return "project-pages/" + encodeURIComponent(repo || "") + ".html";
}

function renderNewsCard(item){
  const article = document.createElement("article");
  article.className = "news-card";

  const head = document.createElement("div");
  head.className = "news-card-head";

  const repo = document.createElement("a");
  repo.className = "repo-link";
  repo.href = repoHref(item.repo);
  repo.textContent = item.repo || "project";
  head.append(repo);

  const badge = text("span", "kind-badge " + (item.kind || "status"), kindLabel(item.kind));
  head.append(badge);

  if(item.metric){
    head.append(text("span", "metric", item.metric));
  }
  article.append(head);

  const title = document.createElement("h2");
  title.className = "news-title";
  const titleLink = document.createElement("a");
  titleLink.href = repoHref(item.repo);
  titleLink.textContent = item.headline || item.repo || "프로젝트 업데이트";
  title.append(titleLink);
  article.append(title);

  if(item.detail){
    article.append(text("p", "news-detail", item.detail));
  }
  return article;
}

function renderNews(news){
  const items = Array.isArray(news.items) ? news.items.slice() : [];
  const root = document.getElementById("reportRoot");
  const metaLine = document.getElementById("metaLine");
  const footerMeta = document.getElementById("footerMeta");

  items.sort(function(a, b){ return (b.date || "").localeCompare(a.date || ""); });
  root.replaceChildren();

  const generatedAt = news.generatedAt || "";
  metaLine.textContent = generatedAt ? "데이터 " + generatedAt + " 기준" : "데이터 기준일 없음";
  footerMeta.textContent = generatedAt ? generatedAt + " · 뉴스 " + items.length + "건" : "뉴스 " + items.length + "건";

  if(items.length === 0){
    root.append(text("p", "empty", "표시할 뉴스가 아직 없습니다."));
    return;
  }

  let currentDate = "";
  let group = null;
  items.forEach(function(item){
    const date = item.date || "날짜 없음";
    if(date !== currentDate){
      currentDate = date;
      group = document.createElement("section");
      group.className = "date-group";
      group.append(text("h2", "date-heading", date));
      root.append(group);
    }
    group.append(renderNewsCard(item));
  });
}

async function loadNews(){
  if(location.protocol === "file:") return FALLBACK_NEWS;
  try{
    const response = await fetch("./news.json", { cache:"no-store" });
    if(!response.ok) throw new Error("HTTP " + response.status);
    return await response.json();
  }catch(_error){
    return FALLBACK_NEWS;
  }
}

loadNews()
  .then(renderNews)
  .catch(function(){
    document.getElementById("reportRoot").innerHTML = '<p class="error">뉴스를 표시하지 못했습니다.</p>';
  });
</script>
