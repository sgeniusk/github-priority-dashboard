<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 보고서</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Serif+KR:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#f5f4ed;
  --ivory:#faf9f5;
  --ink:#1B365D;
  --text:#141413;
  --secondary:#3d3d3a;
  --sub:#504e49;
  --meta:#6b6a64;
  --border:#e8e6dc;
  --border-soft:#e5e3d8;
  --serif:"Nanum Myeongjo","Noto Serif KR","Apple SD Gothic Neo",Georgia,serif;
  --sans:"Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif;
  --shadow:0 18px 44px rgba(64,58,40,.055),0 1px 0 rgba(64,58,40,.035);
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  background:var(--parchment);
  color:var(--text);
  font-family:var(--serif);
  font-size:17px;
  line-height:1.55;
  letter-spacing:0;
}
a{color:inherit}
.page{
  width:min(100%,1040px);
  margin:0 auto;
  padding:28px 24px 84px;
}
.top-nav{
  display:flex;
  flex-wrap:wrap;
  gap:8px 18px;
  margin-bottom:54px;
}
.top-link{
  display:inline-flex;
  align-items:center;
  min-height:34px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:13px;
  font-weight:500;
  text-decoration:none;
}
.top-link:hover{text-decoration:underline;text-underline-offset:4px}
h1,h2,h3,p{margin:0}
.hero{
  max-width:820px;
  margin:0 auto 46px;
}
.eyebrow{
  margin:0 0 14px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:12px;
  font-weight:600;
  letter-spacing:.12em;
}
h1{
  font-size:clamp(38px,6vw,68px);
  font-weight:500;
  line-height:1.15;
  color:var(--text);
}
.meta-line{
  margin-top:18px;
  color:var(--meta);
  font-family:var(--sans);
  font-size:13px;
  line-height:1.45;
}
.selector-row{
  margin-top:26px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:10px 14px;
  font-family:var(--sans);
}
.selector-row label{
  color:var(--ink);
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
}
.selector-row select{
  min-width:240px;
  min-height:38px;
  padding:7px 34px 7px 12px;
  color:var(--ink);
  background:var(--ivory);
  border:1px solid var(--border);
  border-radius:6px;
  font-family:var(--sans);
  font-size:14px;
  font-weight:500;
}
.selector-row select:focus{outline:2px solid rgba(27,54,93,.2);outline-offset:2px}
.panel{
  max-width:820px;
  margin:0 auto 24px;
  padding:28px 30px 30px;
  background:var(--ivory);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.project-head{
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;
  align-items:start;
  margin-bottom:22px;
}
.title-row{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px 10px;
}
.tool,.status-pill,.timeline-kind{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:3px 9px;
  border-radius:999px;
  font-family:var(--sans);
  font-size:11px;
  font-weight:700;
  line-height:1.2;
}
.tool{color:#fff;background:var(--tool,#1B365D)}
.tool.claude{--tool:#ff5b22}
.tool.codex{--tool:#3fb950}
.tool.hermes{--tool:#bc8cff}
.tool.hybrid{--tool:#39c5cf;color:#123237}
.status-pill{color:var(--ink);background:#E4ECF5}
.status-pill.paused{color:var(--meta);background:transparent;border:1px dashed var(--meta)}
.progress-mini{width:136px;padding-top:3px}
.pct{color:var(--ink);font-family:var(--sans);font-size:13px;font-weight:700;text-align:right}
.bar{height:6px;margin-top:8px;overflow:hidden;background:var(--border-soft);border-radius:999px}
.bar span{display:block;height:100%;width:var(--value);background:var(--ink);border-radius:999px}
.copy{display:grid;gap:15px;max-width:720px}
.body,.goal{color:var(--secondary);font-size:16.5px;line-height:1.6}
.goal{color:var(--sub)}
.section-title{
  margin:0 0 18px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:13px;
  font-weight:700;
  letter-spacing:.08em;
}
.help-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1fr);
  gap:20px;
}
.callout{
  padding:15px 17px 16px;
  color:var(--secondary);
  background:var(--parchment);
  border-left:3px solid var(--ink);
  border-radius:0 6px 6px 0;
  font-size:15.5px;
  line-height:1.55;
}
.help-list{
  display:grid;
  gap:10px;
  margin:0;
  padding:0;
  list-style:none;
  color:var(--secondary);
  font-size:15px;
}
.help-list li{
  padding-left:16px;
  position:relative;
}
.help-list li::before{
  content:"";
  position:absolute;
  left:0;
  top:.72em;
  width:5px;
  height:5px;
  background:var(--ink);
  border-radius:50%;
}
.blocker{
  display:grid;
  gap:6px;
  padding:14px 0;
  border-top:1px solid var(--border);
}
.blocker:first-child{padding-top:0;border-top:0}
.blocker h3{
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  font-weight:700;
}
.blocker p,.blocker li{
  color:var(--secondary);
  font-size:14.5px;
  line-height:1.55;
}
.timeline{
  max-width:820px;
  margin:0 auto;
}
.timeline-item{
  position:relative;
  display:grid;
  grid-template-columns:132px minmax(0,1fr);
  gap:18px;
  padding:0 0 24px;
}
.timeline-item::before{
  content:"";
  position:absolute;
  left:123px;
  top:8px;
  bottom:0;
  width:1px;
  background:var(--border);
}
.timeline-item:last-child::before{display:none}
.timeline-date{
  color:var(--meta);
  font-family:var(--sans);
  font-size:12px;
  line-height:1.4;
  word-break:break-word;
}
.timeline-card{
  position:relative;
  padding:18px 20px 19px;
  background:var(--ivory);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.timeline-card::before{
  content:"";
  position:absolute;
  left:-27px;
  top:8px;
  width:9px;
  height:9px;
  background:var(--ink);
  border:2px solid var(--parchment);
  border-radius:50%;
}
.timeline-kind{color:var(--ink);background:#E4ECF5;margin-bottom:9px}
.timeline-kind.commit{color:#245229;background:#dff4e5}
.timeline-kind.note{color:#5a3416;background:#ffe5d6}
.timeline-text{color:var(--secondary);font-size:15.8px;line-height:1.55}
.sha{margin-top:8px;color:var(--meta);font-family:var(--sans);font-size:12px}
.empty,.error{
  max-width:820px;
  margin:70px auto;
  color:var(--meta);
  font-family:var(--sans);
  font-size:14px;
}
footer{
  max-width:820px;
  margin:62px auto 0;
  padding-top:22px;
  border-top:1px solid var(--border);
  color:var(--meta);
  font-family:var(--sans);
  font-size:12px;
  line-height:1.5;
}
@media (max-width:760px){
  body{font-size:16px}
  .page{padding:22px 18px 62px}
  .top-nav{margin-bottom:40px}
  .panel{padding:24px 20px}
  .project-head{grid-template-columns:1fr}
  .progress-mini{width:100%;max-width:180px}
  .pct{text-align:left}
  .help-grid{grid-template-columns:1fr}
  .timeline-item{grid-template-columns:1fr;gap:8px;padding-left:22px}
  .timeline-item::before{left:4px}
  .timeline-card::before{left:-23px}
  .selector-row{align-items:flex-start;flex-direction:column}
  .selector-row select{width:100%}
}
</style>
</head>

<main class="page">
  <nav class="top-nav" aria-label="보고서 이동">
    <a class="top-link" href="report.html">← 뉴스</a>
    <a class="top-link" href="dashboard.html">← 대시보드</a>

  <header class="hero">

    <div class="selector-row">
      <label for="projectSelector">프로젝트 이동</label>
      <select id="projectSelector" aria-label="프로젝트 선택"></select>
    </div>
  </header>
  <section class="panel" id="headerPanel" aria-live="polite"></section>
  <section class="panel" id="helpPanel"></section>
  <section class="timeline" id="timelinePanel"></section>
  <footer id="footerMeta"></footer>
</main>

<script>
function readSeed(id){
  return JSON.parse(document.getElementById(id).textContent);
}
const FALLBACK_PROJECTS = readSeed("fallback-projects");
const FALLBACK_REPORTS = readSeed("fallback-reports");
const FALLBACK_SUGGESTIONS = readSeed("fallback-suggestions");
const FALLBACK_LOGS = readSeed("fallback-logs");

const STATUS_LABELS = { paused:"일시중단" };

function text(tag, className, value){
  const el = document.createElement(tag);
  if(className) el.className = className;
  el.textContent = value || "";
  return el;
}

function loadJson(path, fallback){
  if(location.protocol === "file:") return Promise.resolve(fallback);
  return fetch(path, { cache:"no-store" })
    .then(function(response){
      if(!response.ok) throw new Error("HTTP " + response.status);
      return response.json();
    })
    .catch(function(){ return fallback; });
}

function allReportServices(reports){
  const fields = Array.isArray(reports.fields) ? reports.fields : [];
  return fields.flatMap(function(field){ return Array.isArray(field.services) ? field.services : []; });
}

function projectName(project, service, repo){
  return (service && service.name) || (project && project.displayName) || repo || "프로젝트 보고서";
}

function chooseRepo(projectsData){
  const projects = Array.isArray(projectsData.projects) ? projectsData.projects : [];
  const queryRepo = new URLSearchParams(location.search).get("repo");
  if(queryRepo && projects.some(function(project){ return project.name === queryRepo; })) return queryRepo;
  const active = projects.find(function(project){ return project.status === "active"; });
  return (active || projects[0] || {}).name || "";
}

function setSelector(projects, repo, state){
  const selector = document.getElementById("projectSelector");
  selector.replaceChildren();
  projects.slice().sort(function(a, b){ return (a.rank || 0) - (b.rank || 0); }).forEach(function(project){
    const option = document.createElement("option");
    option.value = project.name;
    option.textContent = project.displayName || project.name;
    selector.append(option);
  });
  selector.value = repo;
  selector.onchange = function(){
    const nextRepo = selector.value;
    const url = new URL(location.href);
    url.searchParams.set("repo", nextRepo);
    history.pushState({ repo: nextRepo }, "", url);
    renderProject(nextRepo, state);
  };
}

function renderHeader(repo, project, service, reportsData){
  const panel = document.getElementById("headerPanel");
  const title = document.getElementById("projectTitle");
  const meta = document.getElementById("projectMeta");
  const footer = document.getElementById("footerMeta");
  const name = projectName(project, service, repo);
  const tool = (service && service.tool) || (project && project.tool) || "";
  const status = (service && service.status) || (project && project.status) || "";
  const total = Number((service && service.total) || (project && project.progress && project.progress.total) || 0);

  title.textContent = name;
  meta.textContent = "데이터 " + ((reportsData.meta && reportsData.meta.asOf) || reportsData.generatedAt || "기준일 없음") + " 기준";
  footer.textContent = repo + " · " + total + "%";
  document.title = name + " · 프로젝트 보고서";
  panel.replaceChildren();

  const head = document.createElement("div");
  head.className = "project-head";

  const left = document.createElement("div");
  const row = document.createElement("div");
  row.className = "title-row";
  row.append(text("span", "tool " + tool, tool));
  const statusClass = status === "paused" ? "status-pill paused" : "status-pill";
  row.append(text("span", statusClass, STATUS_LABELS[status] || status));
  left.append(row);
  head.append(left);

  const progress = document.createElement("div");
  progress.className = "progress-mini";
  progress.append(text("div", "pct", total + "%"));
  const bar = document.createElement("div");
  bar.className = "bar";
  const fill = document.createElement("span");
  fill.style.setProperty("--value", Math.max(0, Math.min(100, total)) + "%");
  bar.append(fill);
  progress.append(bar);
  head.append(progress);
  panel.append(head);

  const copy = document.createElement("div");
  copy.className = "copy";
  if(service && service.body) copy.append(text("p", "body", service.body));
  if(service && service.goal) copy.append(text("p", "goal", service.goal));
  panel.append(copy);
}

function appendList(parent, items){
  if(!Array.isArray(items) || items.length === 0) return false;
  const ul = document.createElement("ul");
  ul.className = "help-list";
  items.forEach(function(item){ ul.append(text("li", "", item)); });
  parent.append(ul);
  return true;
}

function renderHelp(project, service, suggestions){
  const panel = document.getElementById("helpPanel");
  panel.replaceChildren();
  panel.append(text("h2", "section-title", "도움 패널"));

  const grid = document.createElement("div");
  grid.className = "help-grid";

  const left = document.createElement("div");
  if(service && service.advice){
    left.append(text("p", "callout", service.advice));
  }
  left.append(text("h3", "section-title", "다음 액션"));
  if(!appendList(left, project && project.nextActions)){
    left.append(text("p", "empty", "등록된 다음 액션이 없습니다."));
  }

  const right = document.createElement("div");
  right.append(text("h3", "section-title", "블로커와 정체 신호"));
  let hasBlocker = false;
  if(project && Array.isArray(project.risks) && project.risks.length){
    const block = document.createElement("div");
    block.className = "blocker";
    block.append(text("h3", "", "리스크"));
    appendList(block, project.risks);
    right.append(block);
    hasBlocker = true;
  }
  suggestions.forEach(function(item){
    const block = document.createElement("div");
    block.className = "blocker";
    block.append(text("h3", "", item.title));
    if(item.detail) block.append(text("p", "", item.detail));
    if(item.recommendation) block.append(text("p", "", item.recommendation));
    appendList(block, item.actions);
    right.append(block);
    hasBlocker = true;
  });
  if(!hasBlocker){
    right.append(text("p", "empty", "표시할 블로커가 없습니다."));
  }

  grid.append(left, right);
  panel.append(grid);
}

function timelineLabel(entry){
  if(entry.kind === "commit") return "커밋";
  if(entry.kind === "progress") return "진척 변동";
  if(entry.kind === "note") return entry.label || "조언";
  return entry.kind || "기록";
}

function renderTimeline(repo, logsData){
  const root = document.getElementById("timelinePanel");
  root.replaceChildren();
  root.append(text("h2", "section-title", "누적 타임라인"));
  const logs = (logsData && logsData.logs) || {};
  const entries = logs[repo] || [];
  const sorted = entries.slice().sort(function(a, b){ return (b.date || "").localeCompare(a.date || ""); });

  if(sorted.length === 0){
    root.append(text("p", "empty", "아직 누적 로그가 없습니다."));
    return;
  }

  sorted.forEach(function(entry){
    const item = document.createElement("article");
    item.className = "timeline-item";
    item.append(text("div", "timeline-date", entry.date));

    const card = document.createElement("div");
    card.className = "timeline-card";
    card.append(text("span", "timeline-kind " + (entry.kind || ""), timelineLabel(entry)));
    card.append(text("p", "timeline-text", entry.text));
    if(entry.sha) card.append(text("p", "sha", entry.sha));
    item.append(card);
    root.append(item);
  });
}

function renderProject(repo, state){
  const projects = Array.isArray(state.projects.projects) ? state.projects.projects : [];
  const services = allReportServices(state.reports);
  const project = projects.find(function(item){ return item.name === repo; });
  const service = services.find(function(item){ return item.repo === repo; });
  const suggestions = ((state.suggestions && state.suggestions.items) || []).filter(function(item){ return item.repo === repo; });

  if(!repo || (!project && !service)){
    document.getElementById("headerPanel").innerHTML = '<p class="error">표시할 프로젝트를 찾지 못했습니다.</p>';
    document.getElementById("helpPanel").replaceChildren();
    document.getElementById("timelinePanel").replaceChildren();
    return;
  }

  document.getElementById("projectSelector").value = repo;
  renderHeader(repo, project, service, state.reports);
  renderHelp(project, service, suggestions);
  renderTimeline(repo, state.logs);
}

Promise.all([
  loadJson("./projects.json", FALLBACK_PROJECTS),
  loadJson("./reports.json", FALLBACK_REPORTS),
  loadJson("./suggestions.json", FALLBACK_SUGGESTIONS),
  loadJson("./project-logs.json", FALLBACK_LOGS)
]).then(function(values){
  const state = { projects:values[0], reports:values[1], suggestions:values[2], logs:values[3] };
  const repo = chooseRepo(state.projects);
  const projects = Array.isArray(state.projects.projects) ? state.projects.projects : [];
  setSelector(projects, repo, state);
  renderProject(repo, state);
  window.onpopstate = function(){ renderProject(chooseRepo(state.projects), state); };
}).catch(function(){
  document.getElementById("headerPanel").innerHTML = '<p class="error">프로젝트 보고서를 표시하지 못했습니다.</p>';
});
</script>
