name: Deploy dashboard to GitHub Pages

# main 브랜치에 push될 때마다 저장소를 GitHub Pages로 배포한다.
# 정적 파일만 배포하므로 별도 시크릿이 필요 없다 (GITHUB_TOKEN으로 충분).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
