name: twice-daily-refresh

# 매일 08:45·20:45 KST(23:45·11:45 UTC) — Codex 로컬 자동화보다 15분 먼저
# GitHub 활동을 갱신한다. 로컬 자동화는 09:00·21:00에 토큰·사용량을 합쳐
# Sites를 다시 배포한다.
# claude.ai 루틴이 원격 환경에서 토큰 없이 매일 무동작이던 문제를 대체.
#
# 필수 시크릿:
#   GH_PAT_REFRESH — sgeniusk 계정의 비공개 리포 11개를 읽을 수 있는
#   fine-grained PAT (Repository access = All repos owned by sgeniusk,
#   Permissions = Contents: Read-only, Metadata: Read-only). 이 워크플로우의
#   푸시 권한은 본 리포 기본 GITHUB_TOKEN으로 충분.

on:
  schedule:
    - cron: '45 23 * * *'  # 08:45 KST
    - cron: '45 11 * * *'  # 20:45 KST
  workflow_dispatch:        # 수동 트리거 허용 — 디버그·재실행용

permissions:
  contents: write

concurrency:
  group: twice-daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run refresh-progress.mjs
        env:
          # GH_PAT_REFRESH가 없으면 기본 GITHUB_TOKEN으로 폴백 — public 리포만 수집됨
          GH_TOKEN: ${{ secrets.GH_PAT_REFRESH || secrets.GITHUB_TOKEN }}
        run: node scripts/refresh-progress.mjs

      - name: Validate generated dashboard
        run: |
          node scripts/validate.mjs
          node scripts/check-report-pages.mjs

      - name: Commit & push if changed
        run: |
          if [ -z "$(git status --porcelain projects.json history.json activity.json news.json project-logs.json project-pages monthly-analysis.json monthly-analysis.html dashboard.html)" ]; then
            echo "✓ 변경 없음 — 커밋 건너뜀"
            exit 0
          fi
          git config user.name  'dashboard-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add projects.json history.json activity.json news.json project-logs.json project-pages monthly-analysis.json monthly-analysis.html dashboard.html
          git commit -m "대시보드 아침·저녁 자동 갱신 — $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
