<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   프로젝트 마을 — 걸어다니는 픽셀아트 게임
   GitHub 프로젝트 = 건물, agents = 건물 내부 NPC
   에셋: Kenney Tiny Town(타일) + Roguelike Characters(캐릭터), CC0
   ══════════════════════════════════════════════════════════════ */

/* ── 상수 ── */
const TILE = 16, SCALE = 4, TS = TILE * SCALE;          // 렌더 타일 64px (스타듀급 줌)
const MAPW = 64, MAPH = 48;                              // 오버월드 크기(타일)
const SPEED = 2.0;                                       // 이동 속도(미스케일 px/프레임)

// Kenney Tiny Town 타일 인덱스 (12열, idx = row*12 + col)
const T = {
  GRASS:[0,0,0,1,1,2],                  // 잔디 변형 (마지막=꽃)
  DIRT:[39,40,41,42],                   // 흙길 변형
  TREES:[28], MUSH:29,
  WATER:131, SHORE:43,
  ROOF:{ gy:[48,49,50], gy2:[60,61,62], rd:[52,53,54], rd2:[64,65,66] },
  WALL:73, WALL_WIN:72, WIN:84, DOOR:86, ISTONE:126,
  SIGN:83, BARREL:106, POT:107, CHEST:130
};
// 도구별 색 (CLAUDE.md 도구 색 정본)
const TOOLC = { claude:0xff5b22, codex:0x3fb950, hermes:0xbc8cff, hybrid:0x39c5cf };
const TOOLCSS = { claude:'#ff5b22', codex:'#3fb950', hermes:'#bc8cff', hybrid:'#39c5cf' };
const TOOLLBL = { claude:'Claude', codex:'Codex', hermes:'Hermes', hybrid:'Claude+Codex' };

/* ── 전역 상태 ── */
let app, world, groundC, objectC, actorC;
let TILESET, CHARS;
const texCache = {};
let MAP = null;                 // 현재 맵 {kind,w,h,ground,object,solid,buildings,npcs,exit,spawn,project}
let player = { wx:0, wy:0, dir:'down', moving:false, animT:0, frame:0, spr:null };
let cam = { x:0, y:0 };
let keys = {};
let interactT = null;           // 현재 상호작용 대상
let panelOpen = false;
let projects = [], suggestions = [];
let returnPos = null;           // 인테리어에서 나올 때 복귀 좌표
let BTEX = {};                  // 건물 커스텀 스프라이트 (assets/town/buildings/<repo>.png)
let PLAYER_TEX = null;          // 4방향 플레이어 시트 (assets/town/player.png) — 있으면 사용
let trail = [];                 // 플레이어 위치 이력 — 동반자가 따라감
const TRAIL_MAX = 120;
const PETS = [
  { id:'haechi', name:'해치', emoji:'🐶', delay:28, tex:null, wx:0, wy:0, dir:'down', frame:0, animT:0, bobT:0, spr:null, lbl:null },
  { id:'happy',  name:'해삐', emoji:'🐱', delay:60, tex:null, wx:0, wy:0, dir:'down', frame:0, animT:0, bobT:0, spr:null, lbl:null }
];
let OBJ_TEX = {};               // 환경 오브젝트 커스텀 텍스처 (tree/water/mush) — 있으면 사용, 없으면 Kenney 폴백

/* ── 텍스처 헬퍼 ── */
function tileTex(idx){
  const k = 't'+idx;
  if(!texCache[k]){
    const c = idx % 12, r = (idx / 12) | 0;
    texCache[k] = new PIXI.Texture(TILESET, new PIXI.Rectangle(c*16, r*16, 16, 16));
  }
  return texCache[k];
}
function charTex(c, r){
  const k = 'c'+c+'_'+r;
  if(!texCache[k]) texCache[k] = new PIXI.Texture(CHARS, new PIXI.Rectangle(c*17, r*17, 16, 16));
  return texCache[k];
}
function tileSprite(idx){
  const s = new PIXI.Sprite(tileTex(idx));
  s.scale.set(SCALE);
  return s;
}

// 4방향 플레이어 시트 로더 — 4행(down/up/left/right) × N프레임, 정사각 프레임 가정
function loadPlayerSheet(){
  return PIXI.Assets.load('./assets/town/player.png').then(tex=>{
    if(!tex || tex.width<8) return null;
    const fh = tex.height/4, fw = fh;
    const cols = Math.max(1, Math.round(tex.width/fw));
    const out = { fw, fh, frames:cols };
    ['down','up','left','right'].forEach((d,r)=>{
      out[d]=[];
      for(let c=0;c<cols;c++)
        out[d].push(new PIXI.Texture(tex.baseTexture, new PIXI.Rectangle(c*fw, r*fh, fw, fh)));
    });
    return out;
  }).catch(()=>null);
}
// 동반자(개·고양이) 시트 로더 — 정면 단일행, N프레임
function loadPetSheet(url){
  return PIXI.Assets.load(url).then(tex=>{
    if(!tex || tex.width<8) return null;
    const fh = tex.height, fw = fh;
    const cols = Math.max(1, Math.round(tex.width/fw));
    const frames = [];
    for(let c=0;c<cols;c++)
      frames.push(new PIXI.Texture(tex.baseTexture, new PIXI.Rectangle(c*fw, 0, fw, fh)));
    return { frames, fw, fh };
  }).catch(()=>null);
}
// 단일 텍스처 로더 (나무·물·버섯 같은 환경 오브젝트)
function loadTex(url){
  return PIXI.Assets.load(url).then(t=>(t&&t.width>1)?t:null).catch(()=>null);
}

/* ── 부팅 ── */
async function boot(){
  PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
  app = new PIXI.Application({
    resizeTo: window, backgroundColor: 0x3b7a3a,
    antialias: false, roundPixels: true,
    resolution: 1, autoDensity: true
  });
  document.body.appendChild(app.view);

  // 에셋 로드
  try {
    const [ts, ch] = await Promise.all([
      PIXI.Assets.load('./assets/town/tileset.png'),
      PIXI.Assets.load('./assets/town/chars.png')
    ]);
    TILESET = ts.baseTexture; CHARS = ch.baseTexture;
  } catch(e){
    return showError('에셋 이미지를 불러오지 못했어요.<br>assets/town/ 폴더를 확인해 주세요.');
  }

  // 데이터 로드
  try {
    const [pj, sj] = await Promise.all([
      fetch('./projects.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw 0;return r.json()}),
      fetch('./suggestions.json',{cache:'no-store'}).then(r=>r.ok?r.json():{items:[]}).catch(()=>({items:[]}))
    ]);
    projects = (pj.projects || []).slice();
    suggestions = (sj && sj.items) || [];
  } catch(e){
    return showError(
      '프로젝트 데이터를 불러오지 못했어요.<br>' +
      '<code>file://</code>로 열면 막혀요 — 로컬 서버로 열어주세요:<br>' +
      '<code>python3 -m http.server</code> 후 <code>http://localhost:8000/town.html</code>');
  }

  // 건물 커스텀 스프라이트 — assets/town/buildings/<repo>.png 있으면 사용, 없으면 타일 조합 폴백
  await Promise.all(projects.map(p=>
    PIXI.Assets.load('./assets/town/buildings/'+p.name+'.png')
      .then(t=>{ if(t&&t.width>1) BTEX[p.name]=t; }).catch(()=>{})
  ));

  // 플레이어 4방향 시트 + 동반자 시트 (있으면 사용, 없으면 폴백)
  PLAYER_TEX = await loadPlayerSheet();
  PETS[0].tex = await loadPetSheet('./assets/town/dog.png');
  PETS[1].tex = await loadPetSheet('./assets/town/cat.png');

  // 환경 오브젝트 커스텀 텍스처 (있으면 사용, 없으면 Kenney/Graphics 폴백)
  OBJ_TEX.tree  = await loadTex('./assets/town/tree.png');
  OBJ_TEX.water = await loadTex('./assets/town/water.png');
  OBJ_TEX.mush  = await loadTex('./assets/town/mush.png');

  // 컨테이너 구성
  world = new PIXI.Container();
  app.stage.addChild(world);

  // 플레이어 스프라이트 — 시트가 있으면 4방향, 없으면 Kenney 정면 단일
  const pt = PLAYER_TEX ? PLAYER_TEX.down[0] : charTex(0,0);
  player.spr = new PIXI.Sprite(pt);
  player.spr.anchor.set(0.5, 1);
  player.spr.scale.set(SCALE);

  loadOverworld();
  document.getElementById('loading').style.display = 'none';

  app.ticker.add(update);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', e=>{ keys[e.code] = false; });
}
function showError(msg){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errmsg').innerHTML = msg;
  document.getElementById('errbox').style.display = 'flex';
}

/* ── 오버월드 — 손으로 짠 유기적 맵 ── */
function mulberry(a){ return function(){ a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296; }; }
function inB(G,x,y){ return x>=0&&y>=0&&x<G.W&&y<G.H; }
function isVeg(i){ return T.TREES.indexOf(i)>=0||i===T.MUSH; }
function putTree(G,x,y,rnd){
  if(!inB(G,x,y)||G.object[y][x]!==-1)return;
  if(G.ground[y][x]===T.WATER||G.ground[y][x]===T.SHORE)return;
  G.object[y][x]=T.TREES[(rnd()*T.TREES.length)|0]; G.solid[y][x]=1;
}
function setB(G,x,y,i){ if(!inB(G,x,y))return; G.object[y][x]=i; G.solid[y][x]=1; G.ground[y][x]=0; }
// 유기적 연못 — 타원 + 노이즈, 자갈 물가
function carvePond(G,p,rnd){
  for(let y=p.cy-p.ry-3;y<=p.cy+p.ry+3;y++)
  for(let x=p.cx-p.rx-3;x<=p.cx+p.rx+3;x++){
    if(!inB(G,x,y))continue;
    const nx=(x-p.cx)/p.rx, ny=(y-p.cy)/p.ry, d=nx*nx+ny*ny+(rnd()-0.5)*0.22;
    if(d<1){ G.ground[y][x]=T.WATER; G.object[y][x]=-1; G.solid[y][x]=1; }
    else if(d<1.5 && G.ground[y][x]!==T.WATER){ G.ground[y][x]=T.SHORE; G.object[y][x]=-1; G.solid[y][x]=0; }
  }
}
// 숲 군락
function grove(G,cx,cy,r,rnd){
  for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){
    if(!inB(G,x,y))continue;
    if(Math.hypot(x-cx,y-cy)+rnd()*1.6<r && rnd()<0.82) putTree(G,x,y,rnd);
  }
}
// 굽이치는 흙길 — 폴리라인 위를 두툼한 브러시로
function carvePath(G,wp){
  for(let i=0;i<wp.length-1;i++){
    const a=wp[i],b=wp[i+1];
    const steps=Math.max(Math.abs(b[0]-a[0]),Math.abs(b[1]-a[1]))*3+1;
    for(let s=0;s<=steps;s++){
      const t=s/steps, cx=a[0]+(b[0]-a[0])*t, cy=a[1]+(b[1]-a[1])*t, w=1.6;
      for(let y=Math.floor(cy-w);y<=Math.ceil(cy+w);y++)
      for(let x=Math.floor(cx-w);x<=Math.ceil(cx+w);x++){
        if(!inB(G,x,y)||Math.hypot(x-cx,y-cy)>w)continue;
        if(G.ground[y][x]===T.WATER||G.ground[y][x]===T.SHORE)continue;
        if(G.object[y][x]!==-1 && !isVeg(G.object[y][x]))continue;   // 건물 보존
        G.object[y][x]=-1; G.solid[y][x]=0;
        G.ground[y][x]=T.DIRT[(x*3+y*7)%T.DIRT.length];
      }
    }
  }
}
// 유기적 산포 — 꽃·덤불·버섯·나무
function scatterDeco(G,rnd){
  for(let i=0;i<900;i++){
    const x=(rnd()*G.W)|0, y=(rnd()*G.H)|0;
    if(!inB(G,x,y)||G.object[y][x]!==-1)continue;
    const g=G.ground[y][x];
    if(g===T.WATER||g===T.SHORE)continue;
    if(T.DIRT.indexOf(g)>=0){ if(rnd()<0.05) G.object[y][x]=T.MUSH; continue; }
    const r=rnd();
    if(r<0.40) putTree(G,x,y,rnd);
    else if(r<0.50) G.object[y][x]=T.MUSH;
    else if(r<0.74) G.ground[y][x]=2;
  }
}
// 동네별 영역에 건물을 동적 배치 — projects 개수에 따라 자동 확장. 호수·스폰·기존 건물·맵 경계 회피
function generateAndPlaceBuildings(G, projs, buildings, rnd){
  const REGIONS = {
    game:    { x:3,  y:3,  w:26, h:14, roof:'gy' },
    app:     { x:30, y:3,  w:30, h:24, roof:'rd' },
    content: { x:3,  y:28, w:56, h:16, roof:'gy' }
  };
  ['game','app','content'].forEach(cat=>{
    const reg = REGIONS[cat];
    const list = projs.filter(p=>(p.category||'app')===cat)
                      .sort((a,b)=>(a.rank||0)-(b.rank||0));
    list.forEach((p, idx)=>{
      const w = (idx % 3 === 0) ? 6 : 5;
      const h = (idx % 2 === 0) ? 5 : 4;
      const style = (idx % 2 === 0) ? reg.roof : (reg.roof==='gy'?'rd':'gy');
      let placed = false;
      for(let tries=0; tries<800 && !placed; tries++){
        const bx = reg.x + Math.floor(rnd() * Math.max(1, reg.w - w));
        const by = reg.y + Math.floor(rnd() * Math.max(1, reg.h - h));
        if(buildingFits(bx, by, w, h, buildings)){
          placeBuilding(G, bx, by, w, h, style, p, buildings);
          placed = true;
        }
      }
      if(!placed) console.warn('town: 건물 배치 실패 —', p.name, '(동네 공간 부족 — 영역 확장 필요)');
    });
  });
}
function buildingFits(bx, by, w, h, buildings){
  if(bx < 2 || by < 2 || bx+w > MAPW-2 || by+h+1 > MAPH-2) return false;          // 맵 경계 + 트리거 칸
  // 호수 회피 (트리거 행 포함, 약간 여유)
  for(let dx=-1; dx<=w; dx++) for(let dy=-1; dy<=h+1; dy++){
    const nx=(bx+dx-38)/8, ny=(by+dy-33)/6;
    if(nx*nx+ny*ny < 1.45) return false;
  }
  // 스폰 회피 (32, 14)
  if(bx-2 <= 32 && 32 <= bx+w+1 && by-2 <= 14 && 14 <= by+h+2) return false;
  // 다른 건물과 1타일 여유 두고 겹침 방지
  for(const b of buildings){
    if(bx + w + 1 < b.bx) continue;
    if(bx > b.bx + b.w + 1) continue;
    if(by + h + 2 < b.by) continue;
    if(by > b.by + b.h + 2) continue;
    return false;
  }
  return true;
}

// 건물 — w×h 발자국만 solid로 표시. 그림은 rebuildWorld의 drawBuildingVisual이 담당
function placeBuilding(G,bx,by,w,h,style,project,buildings){
  for(let cx=0;cx<w;cx++)for(let ry=0;ry<h;ry++){
    if(inB(G,bx+cx,by+ry)){
      G.object[by+ry][bx+cx]=-1; G.solid[by+ry][bx+cx]=1; G.ground[by+ry][bx+cx]=0;
    }
  }
  const doorC=(w/2)|0;
  buildings.push({ project,bx,by,w,h,style,
    doorTx:bx+doorC, doorTy:by+h-1, trigTx:bx+doorC, trigTy:by+h });
}
// 건물 그림 — 커스텀 스프라이트(BTEX)가 있으면 그걸로, 없으면 Tiny Town 타일 조합
function addBTile(idx,tx,ty,tint){
  const s=tileSprite(idx); s.x=tx*TS; s.y=ty*TS;
  if(tint!=null) s.tint=tint; objectC.addChild(s);
}
function drawBuildingVisual(b){
  const tint = b.project.status==='paused' ? 0x7a7a7a : null;
  const tex = BTEX[b.project.name];
  if(tex){
    // 커스텀 건물 이미지 — 발자국 바닥에 정렬, 지붕은 위로 자연스럽게 솟음
    const s=new PIXI.Sprite(tex);
    s.anchor.set(0.5,1);
    const ww=b.w*TS;
    s.width=ww; s.height=ww*((tex.height/tex.width)||1);
    s.x=(b.bx+b.w/2)*TS; s.y=(b.by+b.h)*TS;
    if(tint!=null) s.tint=tint;
    objectC.addChild(s);
  } else {
    // 폴백 — 타일 조합 건물 (지붕 2줄 + 벽, 가운데 문)
    const isRed=b.style==='rd';
    const r1=isRed?T.ROOF.rd:T.ROOF.gy, r2=isRed?T.ROOF.rd2:T.ROOF.gy2;
    const doorC=(b.w/2)|0;
    for(let cx=0;cx<b.w;cx++){
      const e=cx===0?0:cx===b.w-1?2:1;
      addBTile(r1[e],b.bx+cx,b.by,tint);
      addBTile(r2[e],b.bx+cx,b.by+1,tint);
      for(let ry=2;ry<b.h;ry++){
        const t = ry===b.h-1
          ? (cx===doorC?T.DOOR:((cx===1||cx===b.w-2)?T.WIN:T.WALL))
          : (cx%2===0?T.WALL_WIN:T.WALL);
        addBTile(t,b.bx+cx,b.by+ry,tint);
      }
    }
  }
}

function loadOverworld(){
  const W=MAPW, H=MAPH;
  const ground=[], object=[], solid=[];
  const rnd=mulberry(20260519);
  for(let y=0;y<H;y++){ ground[y]=[];object[y]=[];solid[y]=[];
    for(let x=0;x<W;x++){
      ground[y][x]=T.GRASS[(rnd()*T.GRASS.length)|0];
      object[y][x]=-1; solid[y][x]=0;
    }
  }
  const G={ground,object,solid,W,H};
  // 1) 불규칙한 숲 테두리
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const d=Math.min(x,y,W-1-x,H-1-y);
    if(d < 3 + rnd()*3) putTree(G,x,y,rnd);
  }
  // 2) 연못
  carvePond(G,{cx:38,cy:33,rx:8,ry:6},rnd);
  // 3) 숲 군락
  [[12,28,4],[55,13,4],[56,40,5],[30,43,3],[45,41,3]].forEach(g=>grove(G,g[0],g[1],g[2],rnd));
  // 4) 건물 — 동네별 영역에 동적 배치 (projects 개수 자동 적응)
  const buildings=[];
  generateAndPlaceBuildings(G, projects, buildings, rnd);
  // 5) 굽이치는 길
  [
    [[32,4],[31,13],[26,19],[23,27],[24,42]],
    [[31,13],[42,14],[52,15],[57,24]],
    [[26,19],[13,21],[11,33]],
    [[23,27],[19,38]],
    [[42,14],[39,21],[44,27]]
  ].forEach(wp=>carvePath(G,wp));
  // 6) 유기적 산포
  scatterDeco(G,rnd);
  // 입장 트리거 칸 + 스폰 지점은 걸을 수 있게 비움
  buildings.forEach(b=>{
    if(inB(G,b.trigTx,b.trigTy)){ G.object[b.trigTy][b.trigTx]=-1; G.solid[b.trigTy][b.trigTx]=0; }
  });
  const sx=32, sy=14;
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    if(inB(G,sx+dx,sy+dy) && ground[sy+dy][sx+dx]!==T.WATER){
      object[sy+dy][sx+dx]=-1; solid[sy+dy][sx+dx]=0;
    }
  }
  MAP={kind:'over',w:W,h:H,ground,object,solid,buildings,npcs:[],project:null};
  player.wx=sx*16+8; player.wy=sy*16+14; player.dir='down';
  // 동반자가 처음부터 따라오도록 위치 이력을 스폰 지점으로 채움
  trail = [];
  for(let i=0;i<TRAIL_MAX;i++) trail.push({wx:player.wx, wy:player.wy, dir:'down'});
  rebuildWorld();
}

/* ── 인테리어 생성 (11개 공통 제너릭 룸) ── */
function loadInterior(project){
  const w = 13, h = 9;
  const ground = [], object = [], solid = [];
  for(let y=0;y<h;y++){
    ground[y]=[]; object[y]=[]; solid[y]=[];
    for(let x=0;x<w;x++){
      ground[y][x] = T.ISTONE;
      object[y][x] = -1;
      const border = (x===0||y===0||x===w-1||y===h-1);
      if(border){ object[y][x]=T.WALL; solid[y][x]=1; }
      else solid[y][x]=0;
    }
  }
  // 출구 문 — 하단 벽 가운데
  const exitTx = (w/2)|0;
  object[h-1][exitTx] = T.DOOR; solid[h-1][exitTx] = 0;
  // 게시판 — 상단 벽 근처
  object[1][2] = T.SIGN;
  const board = { tx:2, ty:2 };
  // 장식
  object[1][w-3] = T.BARREL; solid[1][w-3]=1;
  object[1][w-2-1] = T.POT;  solid[1][w-3]=1;
  object[h-2][1] = T.CHEST; solid[h-2][1]=1;

  // 에이전트 NPC 배치
  const agents = agentsOf(project);
  const npcs = [];
  const startX = ((w - agents.length*2) / 2 + 0.5) | 0;
  agents.forEach((ag,i)=>{
    npcs.push({
      agent: ag,
      wx: (startX + i*2)*16 + 8,
      wy: 4*16 + 14,
      spr: null, bobT: Math.random()*6
    });
  });

  MAP = { kind:'interior', w, h, ground, object, solid,
          buildings:[], npcs, project,
          exit:{ tx:exitTx, ty:h-2 }, board };
  player.wx = exitTx*16 + 8; player.wy = (h-2)*16 + 14; player.dir='up';
  trail = []; // 동반자는 인테리어 따라 들어오지 않음
  rebuildWorld();
}

/* ── 월드(컨테이너) 재구성 ── */
function rebuildWorld(){
  world.removeChildren();
  groundC = new PIXI.Container();
  objectC = new PIXI.Container();
  actorC  = new PIXI.Container();
  actorC.sortableChildren = true;

  for(let y=0;y<MAP.h;y++){
    for(let x=0;x<MAP.w;x++){
      const gt = MAP.ground[y][x];
      // 지면 — 물은 커스텀 텍스처가 있으면 sprite, 없으면 파란 면(Graphics) 폴백
      if(gt===T.WATER){
        if(OBJ_TEX.water){
          const s = new PIXI.Sprite(OBJ_TEX.water);
          s.scale.set(TS / OBJ_TEX.water.height);
          s.x = x*TS; s.y = y*TS; groundC.addChild(s);
        } else {
          const wg = new PIXI.Graphics();
          wg.beginFill((x+y)%2 ? 0x57a2d6 : 0x4a8cc6);
          wg.drawRect(x*TS, y*TS, TS, TS); wg.endFill();
          groundC.addChild(wg);
        }
      } else {
        const g = tileSprite(gt);
        g.x = x*TS; g.y = y*TS; groundC.addChild(g);
      }
      // 오브젝트 — 나무·버섯은 커스텀 텍스처 가능
      const o = MAP.object[y][x];
      if(o!==-1){
        if(T.TREES.indexOf(o)>=0){
          // 나무 — 큰 디테일 스프라이트 (커스텀) 또는 Kenney 28 × 1.7배 폴백
          let s;
          if(OBJ_TEX.tree){
            s = new PIXI.Sprite(OBJ_TEX.tree);
            s.scale.set((TS*1.7) / OBJ_TEX.tree.height);
          } else {
            s = tileSprite(o);
            s.scale.set(SCALE*1.7);
          }
          s.anchor.set(0.5,1);
          s.x = x*TS + TS/2; s.y = y*TS + TS + 4;
          objectC.addChild(s);
        } else if(o===T.MUSH && OBJ_TEX.mush){
          const s = new PIXI.Sprite(OBJ_TEX.mush);
          s.scale.set(TS / OBJ_TEX.mush.height);
          s.x = x*TS; s.y = y*TS; objectC.addChild(s);
        } else {
          const s = tileSprite(o);
          s.x = x*TS; s.y = y*TS; objectC.addChild(s);
        }
      }
    }
  }
  // 건물 그림 + 라벨 + 일시중단 표시
  MAP.buildings.forEach(b=>{
    const p = b.project;
    drawBuildingVisual(b);
    const lbl = new PIXI.Text((p.icon?p.icon+' ':'')+(p.displayName||p.name), {
      fontFamily:'Inter,sans-serif', fontSize:11, fontWeight:'700',
      fill:0xffffff, stroke:0x16261a, strokeThickness:4, align:'center'
    });
    lbl.anchor.set(0.5,1);
    lbl.x = (b.bx+b.w/2)*TS; lbl.y = b.by*TS - 3;
    objectC.addChild(lbl);
    if(p.status==='paused'){
      const cone = new PIXI.Text('🚧',{fontSize:24});
      cone.anchor.set(0.5,0.5);
      cone.x=(b.bx+b.w/2)*TS; cone.y=(b.by+b.h/2)*TS; objectC.addChild(cone);
    }
  });
  // 게시판 라벨 (인테리어)
  if(MAP.kind==='interior' && MAP.board){
    const t = new PIXI.Text('📋 프로젝트 현황',{
      fontFamily:'Inter,sans-serif', fontSize:10, fontWeight:'700',
      fill:0xffffff, stroke:0x16261a, strokeThickness:4
    });
    t.anchor.set(0.5,1);
    t.x=(MAP.board.tx+0.5)*TS; t.y=MAP.board.ty*TS-2;
    objectC.addChild(t);
  }

  groundC.cacheAsBitmap = true;
  objectC.cacheAsBitmap = true;

  // NPC 스프라이트
  MAP.npcs.forEach(n=>{
    n.spr = new PIXI.Sprite(charTex(0,0));
    n.spr.anchor.set(0.5,1); n.spr.scale.set(SCALE);
    n.spr.tint = TOOLC[n.agent.tool] || TOOLC.claude;
    actorC.addChild(n.spr);
    // NPC 머리 위 이름
    const nt = new PIXI.Text(n.agent.name,{
      fontFamily:'Inter,sans-serif', fontSize:9, fontWeight:'700',
      fill:0xffffff, stroke:0x16261a, strokeThickness:4
    });
    nt.anchor.set(0.5,1); n.label = nt; actorC.addChild(nt);
  });

  // 동반자(해치·해삐) — 오버월드에서만. 시트 있으면 스프라이트, 없으면 이모지 폴백
  if(MAP.kind==='over'){
    PETS.forEach(pet=>{
      if(pet.tex){
        pet.spr = new PIXI.Sprite(pet.tex.frames[0]);
        pet.spr.anchor.set(0.5,1);
      } else {
        pet.spr = new PIXI.Text(pet.emoji, { fontSize: 36 });
        pet.spr.anchor.set(0.5,1);
      }
      pet.lbl = new PIXI.Text(pet.name, {
        fontFamily:'Inter,sans-serif', fontSize:10, fontWeight:'700',
        fill:0xffffff, stroke:0x16261a, strokeThickness:4
      });
      pet.lbl.anchor.set(0.5,1);
      actorC.addChild(pet.spr);
      actorC.addChild(pet.lbl);
    });
  } else {
    PETS.forEach(p=>{ p.spr=null; p.lbl=null; });
  }

  actorC.addChild(player.spr);
  world.addChild(groundC, objectC, actorC);
}

/* ── 데이터: 에이전트 명단 ── */
function agentsOf(p){
  if(p.agents && p.agents.length) return p.agents;
  const tool = p.tool==='hybrid' ? 'claude' : (p.tool||'claude');
  return [{ name:TOOLLBL[p.tool]||'개발', role:'개발', tool }];
}

/* ── 입력 ── */
function onKeyDown(e){
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if(e.repeat) return;
  if(e.code==='Escape'){ if(panelOpen) closePanel(); return; }
  if(e.code==='Enter' || e.code==='Space' || e.code==='KeyE'){
    if(panelOpen){ closePanel(); return; }
    doInteract();
    return;
  }
  keys[e.code] = true;
}
function keyHeld(){
  return {
    up:    keys['ArrowUp']||keys['KeyW'],
    down:  keys['ArrowDown']||keys['KeyS'],
    left:  keys['ArrowLeft']||keys['KeyA'],
    right: keys['ArrowRight']||keys['KeyD']
  };
}

/* ── 충돌 ── */
function solidAt(px,py){
  const tx = Math.floor(px/16), ty = Math.floor(py/16);
  if(tx<0||ty<0||tx>=MAP.w||ty>=MAP.h) return true;
  return MAP.solid[ty][tx]===1;
}
// 발 히트박스: 폭10 높이7, wy(발) 기준
function blocked(px,py){
  return solidAt(px-5,py-7)||solidAt(px+4,py-7)||
         solidAt(px-5,py-1)||solidAt(px+4,py-1);
}

/* ── 게임 루프 ── */
function update(){
  const dt = app.ticker.deltaMS;
  if(!panelOpen) movePlayer(dt);
  updateActors(dt);
  updateCamera();
  updateInteract();
}

function movePlayer(dt){
  const k = keyHeld();
  let dx=0, dy=0;
  if(k.up)dy-=1; if(k.down)dy+=1; if(k.left)dx-=1; if(k.right)dx+=1;
  player.moving = !!(dx||dy);
  if(player.moving){
    if(dx&&dy){ dx*=0.7071; dy*=0.7071; }
    const step = SPEED * (dt/16.667);
    const nx = player.wx + dx*step;
    if(!blocked(nx, player.wy)) player.wx = nx;
    const ny = player.wy + dy*step;
    if(!blocked(player.wx, ny)) player.wy = ny;
    if(Math.abs(dx)>Math.abs(dy)) player.dir = dx<0?'left':'right';
    else if(dy) player.dir = dy<0?'up':'down';
    player.animT += dt;
    if(player.animT>140){ player.animT=0; player.frame^=1; }
  } else { player.frame=0; player.animT=0; }
  // 스프라이트 갱신 — 4방향 시트 있으면 방향별 텍스처, 없으면 정면+좌우 플립
  if(PLAYER_TEX){
    const frames = PLAYER_TEX[player.dir] || PLAYER_TEX.down;
    player.spr.texture = frames[player.frame % frames.length];
    const s = TS / PLAYER_TEX.fh;
    player.spr.scale.set(s);
  } else {
    player.spr.texture = charTex(player.frame, 0);
    const s = TS / 16;
    player.spr.scale.x = player.dir==='left' ? -s : s;
    player.spr.scale.y = s;
  }
  player.spr.x = player.wx*SCALE;
  player.spr.y = player.wy*SCALE + (player.moving && player.frame ? -2 : 0);
  player.spr.zIndex = player.wy;
  // 동반자 추적용 위치 이력
  if(MAP && MAP.kind==='over'){
    trail.push({wx:player.wx, wy:player.wy, dir:player.dir});
    if(trail.length > TRAIL_MAX) trail.shift();
  }
}

function updateActors(dt){
  MAP.npcs.forEach(n=>{
    n.bobT += dt/1000;
    n.spr.x = n.wx*SCALE;
    n.spr.y = n.wy*SCALE + Math.sin(n.bobT*3)*2 - 1;
    n.spr.zIndex = n.wy;
    if(n.label){ n.label.x=n.wx*SCALE; n.label.y=n.spr.y - (TS+4); }
  });
  // 동반자(해치·해삐) — 위치 이력에서 N프레임 뒤를 추적
  if(MAP.kind==='over'){
    PETS.forEach(p=>{ if(p.spr) updatePet(p, dt); });
  }
}
function updatePet(pet, dt){
  const i = Math.max(0, trail.length - pet.delay);
  const t = trail[i];
  if(t){ pet.wx = t.wx; pet.wy = t.wy; pet.dir = t.dir; }
  pet.bobT += dt/1000;
  if(pet.tex){
    pet.animT += dt;
    if(pet.animT > 200){ pet.animT = 0; pet.frame ^= 1; }
    pet.spr.texture = pet.tex.frames[pet.frame % pet.tex.frames.length];
    const s = (TS * 0.7) / pet.tex.fh;
    pet.spr.scale.x = pet.dir==='left' ? -s : s;
    pet.spr.scale.y = s;
  }
  pet.spr.x = pet.wx * SCALE;
  pet.spr.y = pet.wy * SCALE + Math.sin(pet.bobT*5)*1.5;
  pet.spr.zIndex = pet.wy;
  if(pet.lbl){
    pet.lbl.x = pet.wx * SCALE;
    pet.lbl.y = pet.spr.y - (pet.tex ? TS*0.7 + 6 : 40);
  }
}

function updateCamera(){
  const vw = app.screen.width, vh = app.screen.height;
  const mw = MAP.w*TS, mh = MAP.h*TS;
  let cx = vw/2 - player.wx*SCALE;
  let cy = vh/2 - player.wy*SCALE;
  cx = mw<=vw ? (vw-mw)/2 : Math.min(0, Math.max(vw-mw, cx));
  cy = mh<=vh ? (vh-mh)/2 : Math.min(0, Math.max(vh-mh, cy));
  world.x = Math.round(cx);
  world.y = Math.round(cy);
}

/* ── 상호작용 ── */
function updateInteract(){
  interactT = null;
  const px = player.wx, py = player.wy;
  if(MAP.kind==='over'){
    // 건물 문 근처?
    for(const b of MAP.buildings){
      const dcx = (b.doorTx+0.5)*16, dcy = (b.doorTy+1)*16;
      if(Math.abs(px-dcx)<20 && Math.abs(py-dcy)<26){
        interactT = { type:'enter', building:b };
        break;
      }
    }
  } else {
    // 인테리어 — NPC / 게시판 / 출구
    let best=null, bd=1e9;
    MAP.npcs.forEach(n=>{
      const d = Math.hypot(px-n.wx, py-n.wy);
      if(d<26 && d<bd){ bd=d; best={ type:'npc', npc:n }; }
    });
    const bc = MAP.board;
    if(bc){
      const d = Math.hypot(px-(bc.tx+0.5)*16, py-(bc.ty+1)*16);
      if(d<30 && d<bd){ bd=d; best={ type:'board' }; }
    }
    const ex = MAP.exit;
    const ed = Math.hypot(px-(ex.tx+0.5)*16, py-(ex.ty+1)*16);
    if(ed<24 && ed<bd){ bd=ed; best={ type:'exit' }; }
    interactT = best;
  }
  // HUD 프롬프트
  const el = document.getElementById('prompt');
  if(interactT && !panelOpen){
    let txt='';
    if(interactT.type==='enter') txt = '<b>'+esc(interactT.building.project.displayName||interactT.building.project.name)+'</b> 입장 ▸ <b>Enter</b>';
    else if(interactT.type==='npc') txt = '<b>'+esc(interactT.npc.agent.name)+'</b> 대화 ▸ <b>Enter</b>';
    else if(interactT.type==='board') txt = '프로젝트 현황 보기 ▸ <b>Enter</b>';
    else if(interactT.type==='exit') txt = '마을로 나가기 ▸ <b>Enter</b>';
    el.innerHTML = txt; el.style.display='block';
  } else el.style.display='none';
  // 동네 HUD
  updateDistrictHud();
}
function doInteract(){
  if(!interactT) return;
  if(interactT.type==='enter'){
    returnPos = { wx:player.wx, wy:player.wy };
    loadInterior(interactT.building.project);
  } else if(interactT.type==='exit'){
    const proj = MAP.project;
    loadOverworld();
    if(returnPos){ player.wx=returnPos.wx; player.wy=returnPos.wy; player.dir='down'; }
  } else if(interactT.type==='npc'){
    openNpcPanel(interactT.npc.agent);
  } else if(interactT.type==='board'){
    openBoardPanel(MAP.project);
  }
}

/* ── 동네 HUD ── */
function updateDistrictHud(){
  const el = document.getElementById('district');
  const back = document.getElementById('backLink');
  if(MAP.kind==='interior'){
    const p = MAP.project;
    el.innerHTML = esc(p.displayName||p.name) +
      '<span class="sub">건물 안 — 에이전트와 게시판을 살펴보세요</span>';
    back.style.display='none';
    return;
  }
  back.style.display='block';
  el.innerHTML = '프로젝트 마을<span class="sub">'+MAP.buildings.length+'개 건물 — 다가가서 Enter로 입장</span>';
}

/* ── 패널 (HTML 오버레이) ── */
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function openNpcPanel(ag){
  const col = TOOLCSS[ag.tool] || TOOLCSS.claude;
  let h = `<div class="pbox-hd">
      <span class="tbadge" style="background:${col}">${esc(TOOLLBL[ag.tool]||ag.tool)}</span>
      <span class="ttl">${esc(ag.name)}</span>
      <button class="pbox-x" onclick="closePanel()">✕</button></div>
    <div class="arole">${esc(ag.role||'')}</div>`;
  if(ag.task) h += `<div class="atask"><span class="lbl">맡은 작업</span>${esc(ag.task)}</div>`;
  h += `<div class="phint">Enter · Esc 로 닫기</div>`;
  showPanel(h);
}
function openBoardPanel(p){
  const pr = p.progress || {};
  const total = pr.total != null ? pr.total : (pr.docs||0)+(pr.skeleton||0)+(pr.features||0)+(pr.alpha||0);
  const brk = [
    ['문서', pr.docs||0, 20, '#5b8def'],
    ['골격', pr.skeleton||0, 30, '#b07cff'],
    ['기능', pr.features||0, 30, '#ffc13a'],
    ['알파', pr.alpha||0, 20, '#3fb950']
  ];
  const sugs = suggestions.filter(s=>s.repo===p.name);
  const sev = {high:0,warn:1,info:2};
  let h = `<div class="pbox-hd">
      <span style="font-size:20px">${esc(p.icon||'📦')}</span>
      <span class="ttl">${esc(p.displayName||p.name)}</span>
      <button class="pbox-x" onclick="closePanel()">✕</button></div>`;
  h += `<div class="totline">진척도 ${total}%</div>`;
  h += brk.map(([l,v,m,c])=>`<div class="brk">
      <span class="bl">${l}</span>
      <div class="bt"><div class="bf" style="width:${Math.round(v/m*100)}%;background:${c}"></div></div>
      <span class="bs">${v}/${m}</span></div>`).join('');
  const na = p.nextActions || [];
  if(na.length){
    h += `<div class="sec-t">다음 액션</div>
      <ul style="margin:0;padding-left:18px;font-size:12px;line-height:1.7;color:#cfe2c4">`+
      na.map(x=>`<li>${esc(x)}</li>`).join('')+`</ul>`;
  }
  if(sugs.length){
    h += `<div class="sec-t">코칭 / 제안</div>`;
    h += sugs.slice().sort((a,b)=>(sev[a.severity]??9)-(sev[b.severity]??9))
      .map(s=>`<div class="coach sev-${esc(s.severity)}">
        <div class="ct">${esc(s.title)}</div>
        <div class="cr">${esc(s.recommendation||s.detail||'')}</div></div>`).join('');
  }
  const ags = agentsOf(p);
  h += `<div class="sec-t">에이전트 (${ags.length})</div><div class="npc-list">`;
  h += ags.map(a=>`<div class="npc-row">
      <span class="dot" style="background:${TOOLCSS[a.tool]||TOOLCSS.claude}"></span>
      <span class="nn">${esc(a.name)}</span><span class="nr">· ${esc(a.role||'')}</span></div>`).join('');
  h += `</div>`;
  if(p.url) h += `<div class="phint"><a href="${esc(p.url)}" target="_blank" rel="noopener" style="color:#7ec850">GitHub에서 보기 ↗</a></div>`;
  showPanel(h);
}
function showPanel(html){
  document.getElementById('pbox').innerHTML = html;
  document.getElementById('panel').classList.add('on');
  panelOpen = true;
  keys = {};
}
function closePanel(){
  document.getElementById('panel').classList.remove('on');
  panelOpen = false;
}
window.closePanel = closePanel;
document.getElementById('panel').addEventListener('click',e=>{
  if(e.target.id==='panel') closePanel();
});

boot();
</script>
